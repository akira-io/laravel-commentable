name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912
        with:
          tool: git-cliff

      - name: Generate CHANGELOG
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: git-cliff --config cliff.toml --tag "${{ github.ref_name }}" --output CHANGELOG.md

      - name: Commit CHANGELOG
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          DEFAULT_BRANCH="$(git remote show origin | sed -n 's/.*HEAD branch: //p')"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "CHANGELOG.md is already current."
            exit 0
          fi
          git commit -m "chore(changelog): ${{ github.ref_name }}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Extract release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'body<<EOF'
            git-cliff --config cliff.toml --latest --strip all
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.notes.outputs.body }}" \
            --latest

      - name: Send GitHub Release to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD }}
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
          RELEASE_NAME: ${{ github.ref_name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "Discord webhook is not configured."
            exit 0
          fi

          python3 <<'PY'
          import datetime
          import json
          import os
          import urllib.request

          payload = {
              "content": "||@everyone||",
              "username": "Commentable",
              "avatar_url": "https://avatars.githubusercontent.com/u/116525492?s=96&v=4",
              "embeds": [
                  {
                      "title": os.environ["RELEASE_NAME"],
                      "url": os.environ["RELEASE_URL"],
                      "description": os.environ["RELEASE_BODY"][:4096],
                      "color": 2105893,
                      "footer": {
                          "text": "Commentable",
                          "icon_url": "https://avatars.githubusercontent.com/u/116525492?s=96&v=4",
                      },
                      "timestamp": datetime.datetime.now(datetime.timezone.utc).isoformat(),
                  }
              ],
          }

          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(request, timeout=10) as response:
              response.read()
          PY
